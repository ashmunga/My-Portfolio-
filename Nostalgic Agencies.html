<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wanderlust Travels</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .hero {
      background: url('https://source.unsplash.com/1600x600/?travel,beach') center/cover no-repeat;
      height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }
    footer { background: #222; color: #aaa; padding: 20px 0; }
    footer a { color: #aaa; margin: 0 10px; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Wanderlust Travels</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Destinations</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Tours</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <div>
    <h1>Explore the World</h1>
    <p class="lead">Your adventure starts here</p>
    <button class="btn btn-primary btn-lg mt-3">Book Now</button>
  </div>
</section>

<!-- Destinations -->
<section class="container py-5">
  <h2 class="text-center mb-4">Top Destinations</h2>
  <div class="row g-4">
    <div class="col-md-4">
      <div class="card">
        <img src="https://source.unsplash.com/400x300/?paris" class="card-img-top" alt="Paris">
        <div class="card-body">
          <h5 class="card-title">Paris</h5>
          <p class="card-text">The city of lights and romance.</p>
          <a href="#" class="btn btn-primary">Learn More</a>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card">
        <img src="https://source.unsplash.com/400x300/?bali" class="card-img-top" alt="Bali">
        <div class="card-body">
          <h5 class="card-title">Bali</h5>
          <p class="card-text">Tropical paradise with stunning beaches.</p>
          <a href="#" class="btn btn-primary">Learn More</a>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card">
        <img src="https://source.unsplash.com/400x300/?newyork" class="card-img-top" alt="New York">
        <div class="card-body">
          <h5 class="card-title">New York</h5>
          <p class="card-text">The city that never sleeps.</p>
          <a href="#" class="btn btn-primary
